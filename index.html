<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spell the Summon</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Back-to-hub button — self-contained, replicates the hub's purple pill.
       Placed after style.css and every key property set explicitly so the
       game's own CSS cannot bleed in. -->
  <style>
    /* Home pill now sits INSIDE the sticky #top-bar as a normal in-flow
       element (no position:fixed), so it can never cover the title or score.
       Sized down to fit the bar but kept a 48px tap target. */
    .bh-home-btn {
      flex: 0 0 auto;
      margin: 0;
      background: #8b5cf6;
      color: #fff;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,.6);
      border-radius: 999px;
      padding: 8px 18px;
      font-family: "Comic Sans MS", "Chalkboard SE", "Trebuchet MS", system-ui, sans-serif;
      font-size: clamp(15px, 3.4vw, 18px);
      font-weight: bold;
      line-height: 1;
      box-shadow: 0 4px 0 rgba(0,0,0,.18);
      min-height: 48px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .bh-home-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.18); }
    /* Title takes the middle so Home stays pinned left; on a narrow phone the
       star score wraps to a second line instead of crowding. */
    #top-bar { flex-wrap: wrap; row-gap: 8px; }
    #logo { flex: 1 1 auto; }
  </style>
  <!-- Shared speech helper (loaded before main.js so HaydenSpeak is ready) -->
  <script src="https://reindeerworks.github.io/hayden-shared-assets/speak.js?v=1"></script>
</head>
<body>

  <header id="top-bar">
    <a href="https://hayden.brieflyhome.com" class="bh-home-btn">🏠 Home</a>
    <div id="logo">✨ Spell the Summon</div>
    <div id="stars-display">
      <span id="star-icon">⭐</span>
      <span id="star-count">0</span>
    </div>
  </header>

  <main id="app">
    <!-- Screens injected by JS -->
  </main>

  <script src="data/words.js"></script>
  <script src="main.js"></script>

  <!-- Shared GIF celebration library (hosted once, used across games) -->
  <script src="https://reindeerworks.github.io/hayden-shared-assets/celebrate.js"></script>
  <!-- Fire a celebration GIF whenever the game's win overlay appears.
       Done here (not in main.js) so this addition stays fully self-contained. -->
  <script>
    (function () {
      function celebrate() {
        if (window.HaydenCelebrate) {
          HaydenCelebrate.show({ message: "You did it!" });
        }
      }
      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          var added = mutations[i].addedNodes;
          for (var j = 0; j < added.length; j++) {
            var node = added[j];
            if (node.nodeType === 1 && node.id === "win-overlay") {
              celebrate();
              return;
            }
          }
        }
      });
      obs.observe(document.body, { childList: true });
    })();
  </script>
</body>
</html>
