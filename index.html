<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spell the Summon</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Back-to-hub button — self-contained, replicates the hub's purple pill.
       Placed after style.css and every key property set explicitly so the
       game's own CSS cannot bleed in. -->
  <style>
    .bh-home-btn {
      position: fixed;
      top: 70px;
      left: 12px;
      z-index: 9999;
      background: #8b5cf6;
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 16px clamp(18px, 4vw, 30px);
      font-family: "Comic Sans MS", "Chalkboard SE", "Trebuchet MS", system-ui, sans-serif;
      font-size: clamp(20px, 4.5vw, 28px);
      font-weight: bold;
      line-height: 1;
      box-shadow: 0 6px 0 rgba(0,0,0,.15);
      min-height: 64px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .bh-home-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,.15); }
  </style>
</head>
<body>

  <a href="https://hayden.brieflyhome.com" class="bh-home-btn">🏠 Home</a>

  <header id="top-bar">
    <div id="logo">✨ Spell the Summon</div>
    <div id="stars-display">
      <span id="star-icon">⭐</span>
      <span id="star-count">0</span>
    </div>
  </header>

  <main id="app">
    <!-- Screens injected by JS -->
  </main>

  <script src="data/words.js"></script>
  <script src="main.js"></script>

  <!-- Shared GIF celebration library (hosted once, used across games) -->
  <script src="https://reindeerworks.github.io/hayden-shared-assets/celebrate.js"></script>
  <!-- Fire a celebration GIF whenever the game's win overlay appears.
       Done here (not in main.js) so this addition stays fully self-contained. -->
  <script>
    (function () {
      function celebrate() {
        if (window.HaydenCelebrate) {
          HaydenCelebrate.show({ message: "You did it!" });
        }
      }
      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          var added = mutations[i].addedNodes;
          for (var j = 0; j < added.length; j++) {
            var node = added[j];
            if (node.nodeType === 1 && node.id === "win-overlay") {
              celebrate();
              return;
            }
          }
        }
      });
      obs.observe(document.body, { childList: true });
    })();
  </script>
</body>
</html>
